name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag or version, for example v0.1.0 or 0.1.0"
        required: true

permissions:
  actions: write
  contents: write

env:
  ZIG_VERSION: 0.16.0
  ZIG_SHA256: 70e49664a74374b48b51e6f3fdfbf437f6395d42509050588bd49abe52ba3d00

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - name: Resolve and create tag
        id: resolve
        env:
          RAW_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          IS_MANUAL: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          set -eu
          tag="${RAW_TAG#refs/tags/}"
          case "$tag" in
            v*) ;;
            *) tag="v${tag}" ;;
          esac
          case "$tag" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "Release tag must look like v0.1.0" >&2
              exit 1
              ;;
          esac
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

          if [ "$IS_MANUAL" = "true" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git fetch --tags --force
            current="$(git rev-parse HEAD)"
            if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
              existing="$(git rev-list -n 1 "${tag}")"
              if [ "$existing" != "$current" ]; then
                echo "Tag ${tag} already exists at ${existing}, not current commit ${current}" >&2
                exit 1
              fi
            else
              git tag -a "$tag" -m "Release $tag"
              git push origin "refs/tags/${tag}"
            fi
          fi

  build:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            target: x86_64-linux-musl
          - os: linux
            arch: arm64
            target: aarch64-linux-musl
          - os: linux
            arch: "386"
            target: x86-linux-musl
          - os: linux
            arch: arm
            target: arm-linux-musleabi
          - os: linux
            arch: mips
            target: mips-linux-musleabi
          - os: linux
            arch: mipsel
            target: mipsel-linux-musleabi
          - os: linux
            arch: mips64
            target: mips64-linux-muslabi64
          - os: linux
            arch: mips64el
            target: mips64el-linux-muslabi64
          - os: linux
            arch: riscv64
            target: riscv64-linux-musl
          - os: linux
            arch: s390x
            target: s390x-linux-musl
          - os: linux
            arch: loong64
            target: loongarch64-linux-musl
          - os: freebsd
            arch: amd64
            target: x86_64-freebsd
          - os: freebsd
            arch: arm64
            target: aarch64-freebsd
          - os: freebsd
            arch: "386"
            target: x86-freebsd
          - os: freebsd
            arch: arm
            target: arm-freebsd
          - os: darwin
            arch: amd64
            target: x86_64-macos
          - os: darwin
            arch: arm64
            target: aarch64-macos
          - os: windows
            arch: amd64
            target: x86_64-windows-gnu
          - os: windows
            arch: arm64
            target: aarch64-windows-gnu
          - os: windows
            arch: "386"
            target: x86-windows-gnu
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      - name: Install Zig
        shell: bash
        run: |
          set -eu
          bash scripts/install_zig_ci.sh "zig-x86_64-linux-${ZIG_VERSION}.tar.xz" "${ZIG_SHA256}"
      - name: Build
        run: |
          set -eu
          zig build -Doptimize=ReleaseSmall -Dversion=${{ needs.prepare.outputs.tag }} -Dtarget=${{ matrix.target }}
          mkdir -p dist
          binary="Nodeye-agent"
          asset="Nodeye-agent-${{ matrix.os }}-${{ matrix.arch }}"
          if [ "${{ matrix.os }}" = "windows" ]; then
            binary="Nodeye-agent.exe"
            asset="${asset}.exe"
          fi
          cp "zig-out/bin/${binary}" "dist/${asset}"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: Nodeye-agent-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/Nodeye-agent-${{ matrix.os }}-${{ matrix.arch }}*
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs: [prepare, build]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: dist
          merge-multiple: true
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -eu
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi
          (cd dist && sha256sum Nodeye-agent-* > SHA256SUMS)
          gh release upload "$TAG" dist/Nodeye-agent-* dist/SHA256SUMS --clobber

  fanout:
    runs-on: ubuntu-latest
    needs: [prepare, publish]
    steps:
      - name: Trigger release notes workflow
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -eu
          gh workflow run "Release notes from commits" --repo "$GH_REPO" -f release_tag="$TAG"
      - name: Trigger docker publish workflow
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -eu
          gh workflow run "Publish Docker Image" --repo "$GH_REPO" -f version="$TAG" -f source_ref="$TAG"
