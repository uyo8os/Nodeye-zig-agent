name: Publish Docker Image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Release tag to publish, e.g. v0.1.26
        required: false
        type: string
      source_ref:
        description: Git ref to build from; defaults to the release tag
        required: false
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          [ -n "$VERSION" ] || VERSION="${{ github.event.release.tag_name }}"
          if [ -z "$VERSION" ] && [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
          fi

          SOURCE_REF="${{ github.event.inputs.source_ref }}"
          [ -n "$SOURCE_REF" ] || SOURCE_REF="$VERSION"
          [ -n "$SOURCE_REF" ] || SOURCE_REF="${{ github.sha }}"

          TAGS="type=raw,value=latest"
          if [ -n "$VERSION" ]; then
            TAGS="type=raw,value=${VERSION}"$'\n'"${TAGS}"
          fi

          {
            echo "version=$VERSION"
            echo "source_ref=$SOURCE_REF"
            echo "metadata_tags<<EOF"
            printf "%s\n" "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ steps.release_meta.outputs.source_ref }}
          fetch-depth: 0
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29
        with:
          version: 0.16.0
      - run: |
          VERSION="${{ steps.release_meta.outputs.version }}"
          [ -n "$VERSION" ] || VERSION="${{ github.sha }}"
          zig build -Doptimize=ReleaseSmall -Dversion="$VERSION" -Dtarget=x86_64-linux-musl
          cp zig-out/bin/Nodeye-agent Nodeye-agent-linux-amd64
          zig build -Doptimize=ReleaseSmall -Dversion="$VERSION" -Dtarget=aarch64-linux-musl
          cp zig-out/bin/Nodeye-agent Nodeye-agent-linux-arm64
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: ${{ steps.release_meta.outputs.metadata_tags }}
      - uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
