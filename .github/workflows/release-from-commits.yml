name: Release notes from commits

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to update notes for, e.g. v0.1.32
        required: true
        type: string

permissions:
  contents: write

jobs:
  notes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - shell: bash
        env:
          CURRENT_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.event.release.tag_name }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          git fetch --tags --force
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${CURRENT_TAG}$" | head -n 1 || true)
          echo "# Release $CURRENT_TAG" > RELEASE_NOTES.md
          echo >> RELEASE_NOTES.md
          if [ -n "$PREV_TAG" ]; then
            echo "[Full Changelog](https://github.com/$REPO/compare/$PREV_TAG...$CURRENT_TAG)" >> RELEASE_NOTES.md
            echo >> RELEASE_NOTES.md
            RANGE="$PREV_TAG..$CURRENT_TAG"
          else
            RANGE="$CURRENT_TAG"
          fi
          echo "## Changes" >> RELEASE_NOTES.md
          echo >> RELEASE_NOTES.md
          git log --no-merges --pretty=format:'- %s (%h) by %an' $RANGE >> RELEASE_NOTES.md || true
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        env:
          CURRENT_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.event.release.tag_name }}
        with:
          script: |
            const fs = require('fs');
            const tag = process.env.CURRENT_TAG;
            let releaseId = context.payload.release?.id;
            if (!releaseId) {
              const { data } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              releaseId = data.id;
            }
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              body: fs.readFileSync('RELEASE_NOTES.md', 'utf8'),
            });
